name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref (e.g. rapid PR pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NXF_VERSION: "26.04.4"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: nf-core/setup-nextflow@v2
        with:
          version: ${{ env.NXF_VERSION }}
      - name: Lint Nextflow scripts & config
        run: nextflow lint .
      - name: Resolve every profile
        run: |
          for p in standard gpu slurm; do
            echo "::group::nextflow config -profile $p"
            nextflow config -profile "$p" > /dev/null
            echo "::endgroup::"
          done

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - uses: nf-core/setup-nextflow@v2
        with:
          version: ${{ env.NXF_VERSION }}
      - name: Install nf-test
        run: |
          curl -fsSL https://code.askimed.com/install/nf-test | bash
          sudo mv nf-test /usr/local/bin/
      - name: Run fast tests
        run: nf-test test --tag fast --ci
