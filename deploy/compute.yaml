write_files:
  - path: /usr/local/sbin/cluster-setup.sh
    permissions: '0755'
    content: |
      #!/bin/bash
      # Idempotent compute-node setup. Safe to re-run after fixing anything.
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive
      APT='apt-get -o DPkg::Lock::Timeout=300 -y'

      # Stop package postinst from auto-starting daemons before we've written their config.
      printf '#!/bin/sh\nexit 101\n' > /usr/sbin/policy-rc.d; chmod +x /usr/sbin/policy-rc.d

      # --- packages (core is fatal; apptainer is best-effort so a bad PPA can't block the cluster) ---
      $APT update
      $APT install software-properties-common
      add-apt-repository -y universe
      $APT update
      $APT install munge slurmd slurm-client nfs-common chrony
      ( add-apt-repository -y ppa:apptainer/ppa && $APT update && $APT install apptainer ) \
        || echo "WARNING: apptainer install failed; install it manually (see deploy/README.md)" >&2

      rm -f /usr/sbin/policy-rc.d

      # --- compute-node resource sizing. Required, no defaults: set CPUS/REAL_MEMORY/
      #     MEM_SPEC_LIMIT in cluster.env (render.sh passes them into the runcmd below), or
      #     re-run this script by hand with different values for a different flavor:
      #     sudo CPUS=32 REAL_MEMORY=98000 MEM_SPEC_LIMIT=10240 /usr/local/sbin/cluster-setup.sh
      CPUS="${CPUS:?CPUS is required. Set it in cluster.env and re-render, or pass it directly}"
      REAL_MEMORY="${REAL_MEMORY:?REAL_MEMORY (MB) is required. Set it in cluster.env and re-render}"
      MEM_SPEC_LIMIT="${MEM_SPEC_LIMIT:?MEM_SPEC_LIMIT (MB) is required. Set it in cluster.env and re-render}"

      # --- slurm.conf (must be identical on every node) ---
      install -d -m 0755 /etc/slurm
      cat > /etc/slurm/slurm.conf <<SLURMCONF
      ClusterName=cellpainting
      SlurmctldHost=__HEAD_HOST__
      AuthType=auth/munge
      SlurmUser=slurm
      SlurmctldPort=6817
      SlurmdPort=6818
      ReturnToService=2
      StateSaveLocation=/var/spool/slurmctld
      SlurmdSpoolDir=/var/spool/slurmd
      SlurmctldPidFile=/run/slurmctld.pid
      SlurmdPidFile=/run/slurmd.pid
      SchedulerType=sched/backfill
      SelectType=select/cons_tres
      SelectTypeParameters=CR_CPU_Memory
      ProctrackType=proctrack/cgroup
      TaskPlugin=task/cgroup
      SlurmctldTimeout=120
      SlurmdTimeout=300
      SlurmctldLogFile=/var/log/slurm/slurmctld.log
      SlurmdLogFile=/var/log/slurm/slurmd.log
      NodeName=__COMPUTE_NODES__ CPUs=${CPUS} RealMemory=${REAL_MEMORY} MemSpecLimit=${MEM_SPEC_LIMIT} State=UNKNOWN
      PartitionName=compute Nodes=ALL Default=YES MaxTime=INFINITE State=UP
      SLURMCONF

      cat > /etc/slurm/cgroup.conf <<'CGROUPCONF'
      CgroupPlugin=cgroup/v2
      ConstrainCores=yes
      ConstrainRAMSpace=yes
      CGROUPCONF

      # --- munge key (shared secret, decoded from embedded base64; -x off so it isn't logged) ---
      install -d -o munge -g munge -m 0700 /etc/munge
      set +x
      echo '__MUNGE_KEY_B64__' | base64 -d > /etc/munge/munge.key
      set -x
      chown munge:munge /etc/munge/munge.key
      chmod 0400 /etc/munge/munge.key

      # --- name resolution without DNS: the controller + this node's own name ---
      SELF_IP=$(ip -4 -o addr show scope global | awk '{print $4}' | cut -d/ -f1 | head -1)
      grep -q ' __HEAD_HOST__$' /etc/hosts || echo "__HEAD_IP__ __HEAD_HOST__" >> /etc/hosts
      grep -q " $(hostname)\$" /etc/hosts || echo "$SELF_IP $(hostname)" >> /etc/hosts

      # --- dirs + shared /data over NFS (nofail so a not-yet-ready head can't block boot) ---
      install -d -o slurm -g slurm /var/spool/slurmd /var/log/slurm
      install -d -m 0755 /data
      grep -q ' /data ' /etc/fstab || echo "__HEAD_IP__:/data /data nfs rw,_netdev,hard,nofail 0 0" >> /etc/fstab
      mount -a || echo "WARNING: /data NFS mount failed (head up yet?); retry: sudo mount -a" >&2

      # --- start services only now that config + key exist ---
      systemctl enable --now chrony
      systemctl enable munge slurmd
      systemctl restart munge
      systemctl restart slurmd
      echo "compute-setup done: $(hostname)"

runcmd:
  - CPUS=__CPUS__ REAL_MEMORY=__REAL_MEMORY__ MEM_SPEC_LIMIT=__MEM_SPEC_LIMIT__ bash /usr/local/sbin/cluster-setup.sh
